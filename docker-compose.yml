version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: learner_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8088 --reload
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/learner_coach
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
