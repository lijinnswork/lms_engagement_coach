[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://lms-backend-api-8njf.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/coach/*"
  to = "https://lms-backend-api-8njf.onrender.com/coach/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://lms-backend-api-8njf.onrender.com/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
